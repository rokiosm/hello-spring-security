<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="mx-auto bg-white p-5 rounded shadow-sm" style="max-width: 520px;">
        <h3 class="fw-bold mb-4">비밀번호 변경</h3>

        <div th:if="${param.success}" class="alert alert-success">
            비밀번호가 변경되었습니다.
        </div>

        <div th:if="${passwordError}" class="alert alert-danger" th:text="${passwordError}"></div>

        <form th:action="@{/account/password}" th:object="${passwordChangeDto}" method="post">
            <div class="mb-3">
                <label class="form-label">현재 비밀번호</label>
                <input type="password" th:field="*{currentPassword}" class="form-control">
                <div class="text-danger small" th:errors="*{currentPassword}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">새 비밀번호</label>
                <input type="password" th:field="*{newPassword}" class="form-control">
                <div class="text-danger small" th:errors="*{newPassword}"></div>
            </div>

            <div class="mb-4">
                <label class="form-label">새 비밀번호 확인</label>
                <input type="password" th:field="*{confirmPassword}" class="form-control">
                <div class="text-danger small" th:errors="*{confirmPassword}"></div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">변경</button>
                <a th:href="@{/home}" class="btn btn-outline-secondary">취소</a>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: assignmentFooter}"></div>
</body>
</html>
